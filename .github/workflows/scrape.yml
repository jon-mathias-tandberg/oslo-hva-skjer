name: Scrape events

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC nightly
  workflow_dispatch:        # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run event scrapers
        run: python scrapers/aggregate.py

      - name: Run Vink restaurant scraper
        run: python scrapers/scrape_vink.py

      - name: Run pub scraper (OpenStreetMap)
        run: python scrapers/scrape_pubs.py

      - name: Run restaurant map scraper (OpenStreetMap)
        run: python scrapers/scrape_restaurants_osm.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json frontend/public/data/events.json
          git add data/restaurants.json frontend/public/data/restaurants.json
          git add data/pubs.json frontend/public/data/pubs.json
          git add data/restaurants_osm.json frontend/public/data/restaurants_osm.json
          git diff --staged --quiet || git commit -m "chore: update all data files [skip ci]"
          git push
